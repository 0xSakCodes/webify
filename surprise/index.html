<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>0xSakCodes :)</title>
    <!-- import font-family; -->
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
  </head>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Schoolbell&display=swap');
    /* font styles imported:'Fira Code' + 'Schoolbell' & 'Poppins' */

    body {
      margin: 0;
      background: #0d1117;
      color: #e6edf3;
      font-family: 'Schoolbell', 'Poppins', sans-serif;
      overflow-x: hidden;
    }

    .scene {
      opacity: 0;
      transform: translateY(20px);
      transition: all 1.5s ease;
      width: 90%;
      max-width:650px;
      margin: 60px auto;
    }

    .scene.show {
      opacity: 1;
      transform: translateY(0);
    }

    .buttons {
      margin-top: 20px;
      display: none;
      gap: 10px;
    }

    button {
      padding: 10px 18px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-family: 'Fira Code';
    }
  </style>
  <body>
    <!-- body starts :) -->
    <div id="root"></div>

    <div class="scene" id="buttonsScene">
      <div class="buttons" id="buttons">
        <button id="surprise">🎁 Surprise</button>
        <button id="joke">😄 One More Thing</button>
      </div>
    </div>

    <!-- body ends ;) -->
    <script src="../surprise/index.js"></script>
  </body>
</html>
